<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐑 قطيعي - لوحة تحكم ذكية</title>

    <style>
        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --success: #52b788;
            --warning: #f4a261;
            --danger: #e76f51;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1b1b1b;
            --text-light: #555;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 24px 16px;
            border-radius: 0 0 24px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(45,106,79,0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
        }

        .header .date {
            font-size: 12px;
            opacity: 0.9;
        }

        .header .stage-badge {
            background: rgba(255,255,255,0.25);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .tab {
            padding: 10px 20px;
            background: white;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            box-shadow: var(--shadow);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }

        .stat-card {
            background: var(--card);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .content-section {
            padding: 20px 16px;
        }

        .section-title {
            margin-bottom: 16px;
        }

        .animal-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
        }

        .animal-img {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .animal-info h3 {
            font-size: 15px;
            margin-bottom: 2px;
        }

        .animal-info p {
            font-size: 12px;
            color: var(--text-light);
        }

        .form-container {
            background: var(--card);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-light);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            background: #fafafa;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .image-upload-wrapper {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            position: relative;
            margin-bottom: 10px;
        }

        .image-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        #image-preview {
            width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-top">
        <h1>قطيعي</h1>
        <span class="stage-badge">موسم التسمين</span>
    </div>
    <p class="date">الإثنين، 18 مايو 2026</p>
</header>

<nav class="tabs">
    <div class="tab active">الرئيسية</div>
    <div class="tab">السجل الصحي</div>
    <div class="tab">الأعلاف</div>
    <div class="tab">المبيعات</div>
</nav>

<div class="stats-grid">
    <div class="stat-card">
        <p class="label">إجمالي الرؤوس</p>
        <p class="value" id="totalAnimals">0</p>
    </div>

    <div class="stat-card">
        <p class="label">الحالة العامة</p>
        <p class="value" style="color: var(--success);">ممتازة</p>
    </div>
</div>

<main class="content-section">

    <div class="section-title">
        <h2>إضافة رأس جديد</h2>
    </div>

    <form class="form-container" id="animalForm">

        <div class="form-group">
            <label>صورة الرأس</label>

            <div class="image-upload-wrapper">
                <span id="upload-icon">📸</span>
                <p id="upload-text">اضغط للتصوير</p>

                <input type="file" id="animal-photo" accept="image/*" capture="environment">

                <img id="image-preview">
            </div>
        </div>

        <div class="form-group">
            <label>رقم التعريف / الاسم</label>
            <input type="text" id="animalName" required>
        </div>

        <div class="grid-inputs">

            <div class="form-group">
                <label>السلالة</label>
                <select id="breed">
                    <option>نعيمي</option>
                    <option>نجدي</option>
                    <option>حري</option>
                </select>
            </div>

            <div class="form-group">
                <label>الوزن</label>
                <input type="number" id="weight">
            </div>

        </div>

        <button class="submit-btn" type="submit" id="saveBtn">
            حفظ البيانات
        </button>

    </form>

    <div style="height:20px"></div>

    <div id="animalsList"></div>

</main>

<script>

const photoInput = document.getElementById('animal-photo');
const previewImg = document.getElementById('image-preview');
const uploadText = document.getElementById('upload-text');
const uploadIcon = document.getElementById('upload-icon');
const animalsList = document.getElementById('animalsList');
const totalAnimals = document.getElementById('totalAnimals');

let animals = JSON.parse(localStorage.getItem('animals')) || [];

function renderAnimals(){

    animalsList.innerHTML = '';

    totalAnimals.innerText = animals.length;

    animals.forEach(animal => {

        const card = document.createElement('div');

        card.className = 'animal-card';

        card.innerHTML = `
            <div class="animal-img">🐑</div>

            <div class="animal-info">
                <h3>${animal.name}</h3>
                <p>${animal.breed} - ${animal.weight} كجم</p>
            </div>
        `;

        animalsList.appendChild(card);
    });
}

renderAnimals();

photoInput.addEventListener('change', function() {

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){
            previewImg.src = e.target.result;
            previewImg.style.display = 'block';
            uploadText.style.display = 'none';
            uploadIcon.style.display = 'none';
        }

        reader.readAsDataURL(file);
    }

});


document.getElementById('animalForm').addEventListener('submit', function(e){

    e.preventDefault();

    const animal = {
        name: document.getElementById('animalName').value,
        breed: document.getElementById('breed').value,
        weight: document.getElementById('weight').value
    };

    animals.push(animal);

    localStorage.setItem('animals', JSON.stringify(animals));

    renderAnimals();

    alert('✅ تم الحفظ بنجاح');

    this.reset();

    previewImg.style.display = 'none';

    uploadText.style.display = 'block';

    uploadIcon.style.display = 'block';

});

</script>

</body>
</html>
